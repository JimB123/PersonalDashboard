name: Deploy PR Dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 16 * * *" # 9:00 AM PDT (UTC-7)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Personalize fork (first run only)
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.repository }}"
          PAGES_URL="https://${OWNER}.github.io/${REPO#*/}/"

          # Update config.json with fork owner
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('config.json', 'utf8'));
            config.github_user = '${OWNER}';
            fs.writeFileSync('config.json', JSON.stringify(config, null, 2) + '\n');
          "

          # Update README live demo link if it still points to the template
          if grep -q "roshkhatri.github.io/PersonalDashboard" README.md; then
            sed -i "s|roshkhatri.github.io/PersonalDashboard|${OWNER}.github.io/${REPO#*/}|g" README.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md config.json
            git commit -m "Personalize dashboard for ${OWNER}" || true
            git push || true
          fi

      - name: Fetch PR data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DASHBOARD_USER: ${{ github.repository_owner }}
        run: mkdir -p data && node scripts/fetch-prs.js

      - uses: actions/configure-pages@v5
        id: pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
